        title: The Importance of AI Use Cases in System Classification and Risk Assessment
        #sub_title: The Feedback Loop Between Algorithms and the Real World
        caption: Nov 2024
        link: https://medium.com/@buser.andre/the-importance-of-ai-use-cases-in-system-classification-and-risk-assessment-97795efbd11e
        link_text: medium.com
        #quote: >
        #  An overview of ChatGPT, delving into its underlying mechanisms, constraints, and practical applications.
        description: |
          As organizations increasingly deploy artificial intelligence, a critical challenge emerges in how to classify and assess AI systems.
          In practice, the same AI system could serve vastly different purposes and carry different risks depending on its application. Consider a ML model trained on financial data. When used for internal discussions, it operates in a controlled environment with limited potential for harm. The same model, when deployed for preparing public financial statements, enters a domain with significant regulatory oversight and potential for substantial impact on stakeholders.
        
      - layout: left
        border: weak
        title: Applying Data Analysis in Internal Audit
        #sub_title: The Feedback Loop Between Algorithms and the Real World
        caption: Aug 2024
        link: https://medium.com/@buser.andre/applying-data-analysis-in-internal-audit-77b7a5d6071e
        link_text: medium.com
        #quote: >
        #  An overview of ChatGPT, delving into its underlying mechanisms, constraints, and practical applications.
        description: |
          The application of data analysis in internal audit has been a topic of increasing interest and discussion in my recent months. While numerous knowledge briefs and guides are available from respected organizations like the IIA and ISACA, these resources often present a more high-level and generic approach. As a professional with a background in data science, I’ve found that many existing resources in this area lack some depth and specificity to better bridge the gap between data analysis theory and its practical application in internal audit.

          This observation has motivated me to create this comprehensive guide. This guide explores the application of data analysis techniques in internal auditing, adapting key concepts from academic research methodologies[5] to the practical world of internal audit focusing on two distinct concept.

      - layout: left
