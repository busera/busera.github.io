    content:

      - layout: left
        border: weak
        title: Building an AI prototype for audit planning, without handing judgment to the machine
        caption: May 2026
        link: https://medium.com/@buser.andre/building-an-ai-prototype-for-audit-planning-without-handing-judgment-to-the-machine-d90d0055689b
        link_text: medium.com
        description: |
          A build story about using agentic coding to prototype an AI-assisted audit planning workflow. The article focuses on three audit-planning problems: supporting risk-based planning before fieldwork, creating a stronger draft Audit Work Program for review and refinement, and accelerating planning without handing professional judgment to the machine.

      - layout: left
        border: weak
        title: The Importance of AI Use Cases in System Classification and Risk Assessment
        #sub_title: The Feedback Loop Between Algorithms and the Real World
        caption: Nov 2024
        link: https://medium.com/@buser.andre/the-importance-of-ai-use-cases-in-system-classification-and-risk-assessment-97795efbd11e
        link_text: medium.com
        #quote: >
        #  An overview of ChatGPT, delving into its underlying mechanisms, constraints, and practical applications.
        description: |
          The same AI system can carry very different risks depending on how it's used. A ML model trained on financial data is low-risk when used for internal discussions but high-risk when preparing public financial statements. This distinction matters for classification under frameworks like the EU AI Act, and most organizations get it wrong by classifying the system rather than the use case.
        
      - layout: left
        border: weak
        title: Applying Data Analysis in Internal Audit
        #sub_title: The Feedback Loop Between Algorithms and the Real World
        caption: Aug 2024
        link: https://medium.com/@buser.andre/applying-data-analysis-in-internal-audit-77b7a5d6071e
        link_text: medium.com
        #quote: >
        #  An overview of ChatGPT, delving into its underlying mechanisms, constraints, and practical applications.
        description: |
          Most IIA and ISACA guides on audit analytics stay high-level. As someone with a data science background doing audit work, I kept running into the gap between what those guides describe and what you actually need to do in practice.

          This article bridges that gap. It adapts academic research methodology concepts to the practical world of internal audit, with code examples and concrete techniques you can apply to real engagements.

      - layout: left
        border: weak
        title: Algorithm Ossification
        sub_title: The Feedback Loop Between Algorithms and the Real World
        caption: Jul 2024
        link: https://medium.com/@buser.andre/algorithm-ossification-the-feedback-loop-between-algorithms-and-fe52ecfbf218?source=friends_link&sk=a7da82f03950e839491d34bc6aaa17b1
        link_text: medium.com
        #quote: >
        #  An overview of ChatGPT, delving into its underlying mechanisms, constraints, and practical applications.
        description: |
          Algorithms recommend what we watch and decide whether we get loans. But what happens when they start reshaping the world they were trained to describe? Algorithm ossification is the feedback loop where algorithmic decisions shape the data that future algorithms learn from, reinforcing existing patterns rather than reflecting reality.
      
      - layout: left
        border: weak
        title: Understanding AI System Classification and Risk Assessment
        #sub_title: Explaining these concepts and how they relate to each other
        caption: Jul 2024
        link: https://medium.com/@buser.andre/understanding-ai-system-classification-and-risk-assessment-in-ai-images-tables-a5da2c1eb510?sk=bce834d52700f6741d57f27f4faf6c36
        link_text: medium.com
        #quote: >
        #  An overview of ChatGPT, delving into its underlying mechanisms, constraints, and practical applications.
        description: |
          In the evolving field of artificial intelligence (AI) governance, two important concepts can get mixed up: AI System Classification and AI System Risk Assessment. This confusion can lead to problems in managing the related AI risks. This article aims to explain these concepts and how they relate to each other, using insights from major AI governance frameworks.

